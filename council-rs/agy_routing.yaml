# Agy (Antigravity) CLI model mapping.
# Used when provider "gemini" dispatches to agy_cli (primary path), and for direct "agy_cli".
# Cabinet / roles use legacy gemini- wire IDs (for continuity with Vertex era and models.yaml).
# This translates them to the exact strings shown by `agy models`.
#
# Edit when agy adds/removes Gemini variants.
# See src/provider/agy_route.rs (modeled after grok_route / claude_route patterns).

default_model: "Gemini 3.1 Pro (High)"

# legacy gemini id (from cabinets, roles, models) -> agy CLI --model value
models:
  agy-default: "Gemini 3.1 Pro (High)"
  gemini-3.1-pro-preview: "Gemini 3.1 Pro (High)"
  gemini-3.5-flash: "Gemini 3.5 Flash (Medium)"
  gemini-3.1-flash-lite: "Gemini 3.5 Flash (Low)"
  # direct agy slugs (and future) pass through if not explicitly mapped above
