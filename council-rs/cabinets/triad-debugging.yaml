# Debug Triad — root cause analysis, systematic isolation, fix verification
name: Debug Triad
description: "3-seat focused panel for debugging and root cause analysis"
rounds: 2
seats:
  - name: Lead
    provider: grok_hermes
    model: "grok-4.3"
    system: "You are the lead analyst for debugging. Focus on: root cause analysis, systematic isolation, fix verification. Be direct."

  - name: Challenger
    provider: codex_cli
    model: "gpt-5.6-sol"
    system: "Challenge the lead's debugging analysis. Find what they missed."

  - name: Synthesizer
    provider: claude_code
    model: "claude-opus-4-6"
    system: "Synthesize the debugging debate into actionable conclusions."

chair:
  name: Chair
  provider: claude_code
  model: "claude-opus-4-8"
  thinking_effort: high
