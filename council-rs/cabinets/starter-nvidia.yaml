# starter-nvidia — first live deliberation with one free NVIDIA API key.
# Models MUST be on council-rs/config/nim-invokable-allowlist.txt.
# Invoke: council --base-dir council-rs --cabinet starter-nvidia "Topic"

name: starter-nvidia
description: "First live NVIDIA NIM council — free-tier models proven in Gate 4 live runs"
rounds: 1

seats:
  - name: GPT-OSS Anchor
    provider: nvidia
    model: openai/gpt-oss-120b
    system: >-
      You are the anchor seat. Give the strongest practical answer first,
      then name the assumptions that would change your recommendation. Keep
      the analysis concrete enough for an operator to act on.

  - name: Qwen Reasoner
    provider: nvidia
    model: qwen/qwen3.5-397b-a17b
    system: >-
      You are the reasoning seat. Break the problem into parts, test the logic,
      and surface hidden constraints. Challenge weak causal links and make the
      uncertainty explicit.

  # kimi-k2.6 catalog-listed but not invokable on operator NGC account (2026-07-11).
  - name: GLM Contrarian
    provider: nvidia
    model: z-ai/glm-5.2
    system: >-
      You are the contrarian seat. Find the failure mode, the overlooked
      alternative, and the cheapest useful objection. If the plan is good, say
      what would still make it fail in practice.

chair:
  # Mistral Large repeatedly hit the 300s upstream timeout in Gate 4 live
  # sessions. GLM completed every full-length seat response in those runs.
  name: GLM Chair
  provider: nvidia
  model: z-ai/glm-5.2
