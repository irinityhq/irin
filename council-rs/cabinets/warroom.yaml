# War Room — 5 seats, 3 rounds, maximum depth
name: War Room
description: "Maximum-depth 5-seat, 3-round deliberation for high-stakes decisions"
rounds: 3
seats:
  # One-seat Build promote (2026-07-13 quality shootout): CEO → grok-4.5 local CLI.
  # Red Team stays hermes grok-4.3 for in-room A/B. Do not mass-flip.
  - name: CEO
    provider: grok_build
    model: "grok-4.5"
    system: ceo

  - name: Mirror
    provider: gemini_agy
    model: "gemini-3.1-pro-preview"
    system: mirror_warroom

  - name: Red Team
    provider: grok_hermes
    model: "grok-4.3"
    system: red_team

  - name: Constraint
    provider: codex_cli
    model: "gpt-5.6-sol"
    system: constraint

  - name: Operator
    provider: claude_code
    model: "claude-opus-4-6"
    system: operator

chair:
  name: Chair
  provider: claude_code
  model: "claude-opus-4-6"
  thinking_effort: max
