# Product Triad — user value, market fit, differentiation
name: Product Triad
description: "3-seat focused panel for product decisions"
rounds: 2
seats:
  - name: Lead
    provider: gemini_agy
    model: "gemini-3.1-pro-preview"
    system: "You are the lead analyst for product. Focus on: user value, market fit, differentiation. Be direct."

  - name: Challenger
    provider: grok_hermes
    model: "grok-4.3"
    system: "Challenge the lead's product analysis. Find what they missed."

  - name: Synthesizer
    provider: claude_code
    model: "claude-opus-4-6"
    system: "Synthesize the product debate into actionable conclusions."

chair:
  name: Chair
  provider: claude_code
  model: "claude-opus-4-8"
  thinking_effort: high
