# ==========================================================================
# AI Gateway — nginx.conf
# F5-style AI gateway on free OpenResty.
#
# Phase 0: xAI, OpenAI, NVIDIA only (non-streaming)
# Phase 1: SSE streaming (OpenAI/xAI/NVIDIA shape) + durable state
# Phase 2: Anthropic/Vertex SSE, configurable decontaminator
# ==========================================================================

# Pin the worker user/group explicitly. The OpenResty alpine master runs as root and, with
# no `user` directive, falls back to its compile-time default (`nobody`). We
# pin it to the dedicated triad_mgmt group (gid 9999, created in
# Dockerfile.gateway with nobody as a member) so the worker gid is
# DETERMINISTIC: docker-compose.yml defaults SIDECAR_SOCKET_GID=9999, so the
# sidecar chowns the management UDS to root:triad_mgmt mode 0o660 — the nginx
# worker reaches it via that group, world is denied. The match that matters is
# the worker's EFFECTIVE gid: nginx does initgroups(nobody)+setgid(triad_mgmt),
# so egid becomes triad_mgmt/9999 — that is what the socket group MUST equal.
# (nobody is also addgroup'd to triad_mgmt, so the supplementary path works too,
# but we rely on the egid.) Setting SIDECAR_SOCKET_GID to nobody's primary 65534
# matches neither egid nor a supplementary group → 502, EACCES on connect. This
# 502 was latent from the moment `user nobody triad_mgmt` landed with 65534
# defaults still in place. Host mode (sidecar + nginx same uid) ignores the
# group and uses the owner bit. NOTE: 9999 lives here, in both Dockerfiles, the
# compose default, and .env.example — change it in one place, change it in all.
user nobody triad_mgmt;
worker_processes auto;
error_log /usr/local/openresty/nginx/logs/error.log info;

events {
    worker_connections 4096;
    multi_accept on;
}

env XAI_API_KEY;
env OPENAI_API_KEY;
env ANTHROPIC_API_KEY;
env NVIDIA_API_KEY;
env VERTEX_PROJECT;
env VERTEX_LOCATION;
env VERTEX_GEMINI_MODEL;
env VERTEX_ADC_TOKEN;
env CLAUDE_PROXY_URL;
env CODEX_PROXY_URL;
env GEMINI_PROXY_URL;
env SIDECAR_ADDR;
env SIDECAR_TIMEOUT_MS;
env GW_ENABLE_STREAMING;
env GW_ENABLE_BATCH;
env GATEWAY_CONFIG_PATH;
env _CHAOS_DUMMY;
# Council endpoint (Phase 0.5, spec §5.9). Feature-flagged off by default.
env COUNCIL_GATEWAY_TOKEN;
env COUNCIL_GATEWAY_KEY_ID;
env GW_ENABLE_COUNCIL_ENDPOINT;
env COUNCIL_BASE_URL;
# P0-1: shared-secret bearer tokens for the host-side CLI proxies. When set,
# the gateway injects `X-Proxy-Auth: Bearer <token>` on every upstream call
# to the claude-cli / gpt-cli / gemini-cli providers. Must match the matching
# {CLAUDE,CODEX,GEMINI}_PROXY_TOKEN set in the proxy process env
# (tools/{claude,codex,gemini}-proxy.py).
env CLAUDE_PROXY_TOKEN;
env CODEX_PROXY_TOKEN;
env GEMINI_PROXY_TOKEN;

http {
    # The War Room performs a direct, unauthenticated liveness read against
    # /health. Allow only loopback browser origins and the Tauri webview; an
    # empty map value emits no CORS header for every other origin.
    map $http_origin $health_cors_origin {
        default "";
        "tauri://localhost" $http_origin;
        "https://tauri.localhost" $http_origin;
        ~^https?://localhost(?::[0-9]+)?$ $http_origin;
        ~^https?://127\.0\.0\.1(?::[0-9]+)?$ $http_origin;
        ~^https?://\[::1\](?::[0-9]+)?$ $http_origin;
    }

    # Lua module path
    lua_package_path "/usr/local/openresty/nginx/lua/?.lua;/usr/local/openresty/nginx/lua/lib/?.lua;;";
    # lua-resty-http does not inherit proxy_pass trust settings. Use the
    # image's system CA bundle for verified provider-catalog HTTPS probes.
    lua_ssl_trusted_certificate /etc/ssl/certs/ca-certificates.crt;
    lua_ssl_verify_depth 4;

    # Shared memory zones (F5 equivalent: data-group / session table)
    lua_shared_dict gw_config   5m;    # model registry cache
    lua_shared_dict gw_metrics  20m;   # counters for prometheus
    lua_shared_dict gw_locks    1m;    # mutex for config reload

    # DNS resolver for dynamic proxy_pass.
    # 127.0.0.11 is Docker's embedded DNS — it resolves both internal service
    # names ("sidecar", "host.docker.internal") AND external hostnames
    # (api.openai.com, api.x.ai, etc.) by forwarding unknown queries to the
    # host's resolver. Adding 1.1.1.1/8.8.8.8 to the list was actively harmful:
    # nginx round-robins between listed resolvers, and when an external one
    # was picked it would NXDOMAIN on host.docker.internal — caching the
    # negative answer for `valid` seconds and 502'ing every council request
    # until the cache expired. Stick to one resolver that knows everything.
    resolver 127.0.0.11 valid=30s;
    resolver_timeout 5s;

    # Load config at worker init
    init_by_lua_block {
        local config = require("config")
        config.init()
        local sidecar = require("sidecar")
        sidecar.init()
        local translator = require("translator")
        translator.init()
    }

    # Per-worker init — schedules the council/stats poller (P1-C). Must be
    # init_worker_by_lua_block, not init_by_lua_block, because ngx.timer.*
    # is only available in the worker process, not the master.
    init_worker_by_lua_block {
        local cost = require("cost")
        cost.init_worker()
    }

    # Shared upstream settings
    proxy_http_version    1.1;
    # Never allow an upstream provider to spoof the Gateway-owned correlation
    # header that the server block emits from the local $request_id.
    proxy_hide_header     X-Gateway-Request-ID;
    proxy_ssl_server_name on;
    proxy_ssl_protocols   TLSv1.2 TLSv1.3;
    proxy_connect_timeout 10s;
    # Managed CLI adapters bound their subprocesses at 600s. Keep the proxy
    # window slightly longer so nginx never abandons a still-running child.
    proxy_read_timeout    650s;
    proxy_send_timeout    30s;
    proxy_buffering       on;
    proxy_buffer_size     64k;
    proxy_buffers         8 64k;

    # Request body — must read to parse model name.
    #
    # client_max_body_size sets the HARD upper bound on per-request memory.
    # raw_body lives on ngx.ctx for the full request lifetime (cache_store
    # closure + inbound-ledger sha256 closure both capture it). At 2MB
    # × 100 concurrent requests, worker heap stays under 200MB — bounded
    # by design rather than by a spill-to-scratch-file mechanism that the
    # 127.0.0.1-only deployment model does not need. See
    # COUNCIL_GATEWAY_CONTRACT.md "Body size and memory profile".
    client_body_buffer_size 1m;
    client_max_body_size    2m;

    # Logging — structured JSON for fintech audit
    log_format gateway_json escape=json
        '{'
            '"ts":"$time_iso8601",'
            '"req_id":"$request_id",'
            '"method":"$request_method",'
            '"uri":"$uri",'
            '"status":$status,'
            '"upstream":"$upstream_addr",'
            '"latency_ms":$request_time,'
            '"bytes_sent":$bytes_sent,'
            '"budget_key":"$http_x_budget_key"'
        '}';

    access_log /usr/local/openresty/nginx/logs/access.log gateway_json;

    server {
        listen 8080;
        server_name _;

        # Stable Gateway-owned correlation handle. This is deliberately
        # distinct from X-Request-ID, which is forwarded upstream and may be
        # overwritten by a provider. `always` keeps /v1 errors correlatable
        # with the Gateway ledger as well as successful responses.
        add_header X-Gateway-Request-ID $request_id always;

        # Health check — fast, no Lua
        location = /health {
            access_log off;
            return 200 '{"status":"ok","service":"ai-gateway"}';
            default_type application/json;
            # Defining add_header in a location stops inheritance, so repeat
            # the Gateway correlation header while adding the narrow browser
            # liveness allowance.
            add_header X-Gateway-Request-ID $request_id always;
            add_header Access-Control-Allow-Origin $health_cors_origin always;
            add_header Vary Origin always;
        }

        # Provenance probe for the Rust sidecar. This is deliberately separate
        # from the fast Gateway /health above: sidecar starts after Gateway and
        # making Gateway health depend on this UDS would recreate the boot
        # dependency cycle that compose avoids.
        location = /health/sidecar {
            access_log off;
            proxy_pass http://unix:/run/sidecar/sidecar.sock:/health;
            proxy_connect_timeout 100ms;
            proxy_read_timeout 500ms;
        }

        # Authenticated model registry for zero-spend governed preflight.
        # Exact location only; the normal /v1/ proxy remains unchanged.
        location = /v1/models {
            content_by_lua_block {
                require("router").models()
            }
        }

        # =============================================================
        # Main AI proxy — OpenAI-compatible endpoint
        # All providers via Rosetta translator
        # Streaming gated by GW_ENABLE_STREAMING=1
        # =============================================================
        location /v1/ {
            set $target_url    '';
            set $target_host   '';
            set $auth_value    '';

            # P2-B: enable client-abort detection so router.lua can register an
            # ngx.on_abort handler that unlocks council concurrency slots when
            # the client disconnects mid-deliberation. Without this directive,
            # ngx.on_abort returns nil,"client abort not allowed" and the slot
            # leaks until the sidecar's ~110s TTL sweeper reclaims it — which
            # 429s the caller for up to 2 min under bursty cancellation.
            lua_check_client_abort on;

            # ACCESS PHASE — pick upstream, set auth
            access_by_lua_block {
                require("router").route()
            }

            # Auth headers — managed by router.lua
            # Router strips client-supplied auth and sets provider-specific headers.
            # x-api-key / anthropic-version are set by ngx.req.set_header() in Lua
            # so they flow through automatically. Authorization uses $auth_value.
            proxy_set_header        Authorization $auth_value;

            # Forward to resolved provider
            proxy_pass              $target_url;
            proxy_set_header        Host $target_host;
            proxy_set_header        Content-Type "application/json";
            proxy_set_header        X-Request-ID $request_id;

            # Strip budget key — internal tracking only
            proxy_set_header        X-Budget-Key "";

            # HEADER FILTER PHASE — Inject provenance headers + streaming control
            header_filter_by_lua_block {
                if ngx.ctx.gw then
                    local record = ngx.ctx.gw.record
                    if record then
                        -- The body filter may translate, reshape Responses API
                        -- bodies, or redact credentials after upstream headers
                        -- have arrived. Clear the upstream length before body
                        -- filtering so clients do not see stale byte counts.
                        ngx.header["Content-Length"] = nil
                    end
                    if record and record.is_streaming then
                        ngx.header["X-Accel-Buffering"] = "no"
                    end
                    if ngx.ctx.gw.requested_model then
                        ngx.header["X-Requested-Model"] = ngx.ctx.gw.requested_model
                    end
                    if ngx.ctx.gw.effective_model then
                        ngx.header["X-Effective-Model"] = ngx.ctx.gw.effective_model
                    end
                    if ngx.ctx.gw.dlp_classification then
                        ngx.header["X-DLP-Classification"] = ngx.ctx.gw.dlp_classification
                    end
                    -- Council header capture (spec §6.1). The session id and
                    -- chair tokens drive cost rollup (§6.4 / §6.6); the
                    -- total-cost header is the wrapper's billable spend.
                    if record and record.provider == "council" then
                        record.council_session_id   = ngx.var.upstream_http_x_council_session_id
                        record.council_total_cost   = tonumber(ngx.var.upstream_http_x_total_cost_usd)
                        record.council_chair_tokens = tonumber(ngx.var.upstream_http_x_chair_tokens)
                        -- Re-emit upstream council headers to the client.
                        -- body_filter buffering strips defaults, so set explicitly.
                        if record.council_session_id and record.council_session_id ~= "" then
                            ngx.header["X-Council-Session-Id"] = record.council_session_id
                        end
                        if record.council_total_cost then
                            ngx.header["X-Total-Cost-Usd"] = string.format("%.4f", record.council_total_cost)
                        end
                        if record.council_chair_tokens then
                            ngx.header["X-Chair-Tokens"] = tostring(record.council_chair_tokens)
                        end

                        -- Snapshot the gateway-owned
                        -- response headers so replay can emit a wire-byte-
                        -- equal response. Allow-list (NOT skip-list) — a
                        -- skip-list misses Content-Encoding, ETag, Vary,
                        -- Last-Modified and friends, any of which can break
                        -- a replay's client decode. Allow-list is positive
                        -- enumeration of what the gateway itself sets and
                        -- guarantees safe to replay.
                        --
                        -- Headers NOT in this list are excluded by design:
                        --   * nginx auto-sets (Date, Server, Content-Length,
                        --     Connection, Transfer-Encoding) — regenerated.
                        --   * Per-request (X-Request-ID, X-RateLimit-*) —
                        --     must reflect THIS replay, not the original.
                        --   * Upstream-set body codecs (Content-Encoding,
                        --     ETag, Vary, Last-Modified) — body_filter
                        --     replays a plain-bytes body; replaying the
                        --     upstream codec would lie to the client.
                        --   * X-Idempotency-Replay — added fresh at replay
                        --     time; snapshotting it would mark replays of
                        --     replays incorrectly.
                        local snapshot = {}
                        local allow = {
                            ["content-type"]          = true,
                            ["x-routed-model"]        = true,
                            ["x-routed-provider"]     = true,
                            ["x-routed-fallback"]     = true,
                            ["x-requested-model"]     = true,
                            ["x-effective-model"]     = true,
                            ["x-sovereign-mode"]      = true,
                            ["x-cache"]               = true,
                            ["x-dlp-classification"]  = true,
                            ["x-council-session-id"]  = true,
                            ["x-total-cost-usd"]      = true,
                            ["x-chair-tokens"]        = true,
                            ["x-batch-op"]            = true,
                        }
                        for k, v in pairs(ngx.resp.get_headers(50, true)) do
                            if allow[string.lower(k)] then
                                snapshot[k] = v
                            end
                        end
                        record.council_response_headers = snapshot
                    end
                end
            }

            # BODY FILTER PHASE — capture response for token parsing
            body_filter_by_lua_block {
                require("cost").capture_body()
            }

            # LOG PHASE — parse tokens, calculate cost, write metrics
            log_by_lua_block {
                require("cost").account()
            }
        }

        # =============================================================
        # Batch API passthrough — /v1/batches and /v1/batches/{id}*
        #
        # Forwards batch operations (create / status / results) to the
        # provider selected via X-Provider header (openai|anthropic).
        # Auth, IP check, rate limit, budget, and ledger still apply;
        # decon, cache, and request/response translation are skipped
        # (a file-id reference cannot be scanned, and batch jobs are
        # not cacheable). Cost accounting is deferred — batch creation
        # returns no token usage; the actual spend lands on results
        # download, where the JSONL is parsed line-by-line.
        #
        # Larger body cap because Anthropic batch creation embeds the
        # full requests[] array inline (OpenAI batch creation sends a
        # tiny file_id reference; both fit comfortably under 10m).
        # =============================================================
        location ^~ /v1/batches {
            client_max_body_size    10m;
            client_body_buffer_size 1m;

            set $target_url    '';
            set $target_host   '';
            set $auth_value    '';

            access_by_lua_block {
                require("router").route()
            }

            proxy_set_header        Authorization $auth_value;
            proxy_pass              $target_url;
            proxy_set_header        Host $target_host;
            proxy_set_header        Content-Type "application/json";
            proxy_set_header        X-Request-ID $request_id;
            proxy_set_header        X-Budget-Key "";

            header_filter_by_lua_block {
                if ngx.ctx.gw and ngx.ctx.gw.record then
                    local record = ngx.ctx.gw.record
                    if record.batch_mode then
                        ngx.header["X-Batch-Mode"] = "true"
                        if record.provider then
                            ngx.header["X-Routed-Provider"] = record.provider
                        end
                        if record.batch_op then
                            ngx.header["X-Batch-Op"] = record.batch_op
                        end
                    end
                end
            }

            body_filter_by_lua_block {
                require("cost").capture_body()
            }

            log_by_lua_block {
                require("cost").account()
            }
        }

        # =============================================================
        # Admin API — key provisioning, revocation, rotation
        #
        # Proxied to the Rust sidecar over UDS. Auth is enforced at
        # the sidecar level (admin_key in request body or
        # BOOTSTRAP_TOKEN for initial setup). See docs/runbook.md.
        # =============================================================
        location /admin/ {
            content_by_lua_block {
                require("sidecar").admin_proxy()
            }
        }

        # Phase 3 directive outbox — admin-authenticated row reads/mutations
        # plus the public signing-key read. The sidecar remains the authority;
        # the Gate 4 browser UI reaches only GET reads through Council's BFF.
        # The Rust sidecar owns tenant scoping and authorization; this route
        # only exposes the sidecar UDS REST surface on the gateway HTTP port.
        location ^~ /watch/outbox/ {
            content_by_lua_block {
                require("sidecar").watch_outbox_proxy()
            }
        }

        # Gate 4 operator read: expose exactly one admin-authenticated GET
        # projection. Do not add a broad /watch location here; force-wake,
        # quarantine, worker, producer, and arming surfaces stay UDS-only.
        location ~ ^/watch/ui-snapshot/[^/]+$ {
            content_by_lua_block {
                require("sidecar").watch_ui_snapshot_proxy()
            }
        }

        # Auth rotation (separate path from /admin/ for clarity)
        location = /auth/rotate {
            content_by_lua_block {
                require("sidecar").admin_proxy()
            }
        }

        # Ledger verification + export (read-only, exact-match only)
        location = /ledger/verify {
            content_by_lua_block {
                require("sidecar").admin_proxy()
            }
        }
        location = /ledger/export {
            content_by_lua_block {
                require("sidecar").admin_proxy()
            }
        }

        # Prometheus metrics endpoint
        location = /metrics {
            access_log off;
            content_by_lua_block {
                require("cost").prometheus()
            }
        }

    }
}
