[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
unmaintained = "workspace"
yanked = "deny"
ignore = [
    # Mirrors the existing cargo-audit CI exception; keep both tools aligned.
    "RUSTSEC-2024-0436",
    # Tauri's locked quick-xml consumers do not use NsReader or attribute
    # iteration and accept no untrusted XML. Keep these visible in the nested
    # cargo-audit output and remove the exceptions when Tauri permits >=0.41.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    # glib is present only in Tauri's target-resolved Linux GTK tree. IRIN ships
    # the native shell on macOS; Ubuntu uses War Room Web. Track until the GTK
    # stack permits glib >=0.20.
    "RUSTSEC-2024-0429",
]

[licenses]
version = 2
unused-allowed-license = "allow"
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "NCSA",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "BSL-1.0",
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
deny = []
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
