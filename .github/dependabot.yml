version: 2
# Routine version updates are intentionally disabled. Dependabot security
# updates remain enabled in the repository security settings and are not
# governed by open-pull-requests-limit.
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 0
    groups:
      compatible-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:15"
      timezone: America/Chicago
    open-pull-requests-limit: 0
    groups:
      compatible-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: cargo
    directory: "/council-rs/warroom-tauri/src-tauri"
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Chicago
    open-pull-requests-limit: 0
    groups:
      compatible-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/council-rs/warroom/web"
    schedule:
      interval: weekly
      day: monday
      time: "09:45"
      timezone: America/Chicago
    open-pull-requests-limit: 0
    groups:
      compatible-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  - package-ecosystem: npm
    directory: "/council-rs/warroom-tauri"
    schedule:
      interval: weekly
      day: monday
      time: "10:00"
      timezone: America/Chicago
    open-pull-requests-limit: 0
    groups:
      compatible-minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
