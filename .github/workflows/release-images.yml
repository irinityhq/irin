name: release-images

# Publishes the production Gateway Pack images to GHCR from exact source.
# - Tag lane (v*): release images, tag = the version tag.
# - Dispatch lane: release-candidate images, tag = rc-<sha12> of the selected ref,
#   used by the pre-merge production dry-run. Never mutates any GitHub Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch/SHA to build rc images from"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push Gateway Pack images (linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}
          fetch-depth: 0

      - name: Compute image tag
        id: tag
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=rc-$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish images
        env:
          IRIN_PACK_IMAGES_TAG: ${{ steps.tag.outputs.tag }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: bash scripts/build-gateway-pack-prod-images.sh

      - name: Upload digest receipt
        uses: actions/upload-artifact@v4
        with:
          name: pack-images-${{ steps.tag.outputs.tag }}
          path: packaging/build/gateway-pack/pushed-images-*.env
          retention-days: 90
