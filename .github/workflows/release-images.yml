name: release-images

# Publishes the production Gateway Pack images to GHCR from exact tagged source.
# Tag lane only (v*): tags are push-gated, and the tag name reaches the shell
# only through an environment variable. Release-candidate images for the
# pre-merge dry-run are built locally by scripts/release-transaction.sh
# --dry-run-rc — no arbitrary-ref dispatch exists by design.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-images-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Build and push Gateway Pack images (linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Bind privileged execution to reviewed main history
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git fetch origin main --depth=1
          TAG_COMMIT="$(git rev-parse "${TAG_NAME}^{commit}")"
          git merge-base --is-ancestor "$TAG_COMMIT" origin/main \
            || { echo "ERROR: $TAG_NAME is not reachable from reviewed main history; refusing to publish"; exit 1; }

      - name: Publish images
        env:
          # Env-passed, never substituted into the script body.
          IRIN_PACK_IMAGES_TAG: ${{ github.ref_name }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: bash scripts/build-gateway-pack-prod-images.sh

      - name: Upload digest receipt
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pack-images-${{ github.ref_name }}
          path: packaging/build/gateway-pack/pushed-images-*.env
          retention-days: 90
