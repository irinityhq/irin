name: IRIN CI PR dispatcher

on:
  # No workflow-level paths-ignore: the reusable graph must report its light
  # checks and aggregate context even for documentation-only pull requests.
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  ci:
    # Keep runner selection on reviewed main so pull-request code cannot select
    # a self-hosted runner. The pinned graph checks out and actionlints the PR
    # revision, while this stable job id preserves `ci / CI required`.
    uses: irinityhq/irin/.github/workflows/ci.yml@main
