name: IRIN CI PR dispatcher

on:
  # No workflow-level paths-ignore: the reusable graph must report its light
  # checks and aggregate context even for documentation-only pull requests.
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  ci:
    # Use the graph from the pull request commit so workflow changes prove
    # themselves before merge. Keeping this job id stable preserves the
    # required `ci / CI required` check context.
    uses: ./.github/workflows/ci.yml
