name: Feature request
description: Propose a focused improvement to IRIN.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the operator problem before proposing a solution. IRIN is pre-release, local-first, and single-operator software.

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues for this request.
          required: true
        - label: This request does not disclose a security vulnerability or sensitive local data.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Operator problem
      description: What problem or limitation should IRIN address, and who encounters it?
    validations:
      required: true

  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: Describe the observable result without prescribing implementation details.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Area
      options:
        - Council engine
        - War Room Web
        - Tauri desktop shell
        - Gateway
        - Sentinel or sovereign protocol
        - Setup, runtime, or packaging
        - Documentation
        - Cross-component
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe current workarounds or other approaches you considered.

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance notes
      description: Optional examples or constraints that would make the outcome testable.
